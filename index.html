<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>วางแผนทริปด้วยกัน</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f7f2e8; --card:#fff; --line:#ece4d4; --line2:#e6ddcb;
    --txt:#4a4136; --txt2:#9b8f7e; --txt3:#b9ac96; --head:#3a3228;
    --gold:#c9a96a; --gold2:#a67c3d;
    --stay:#7c5cff; --stayBg:#efeefe; --stayTx:#3c3489;
    --see:#1d9e75; --seeBg:#e1f5ee; --seeTx:#085041;
    --eat:#d85a30; --eatBg:#faece7; --eatTx:#712b13;
    --heart:#e24b6a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Plus Jakarta Sans','Noto Sans Thai',system-ui,sans-serif;background:var(--bg);color:var(--txt);padding:24px 16px 60px;-webkit-font-smoothing:antialiased}
  .wrap{max-width:960px;margin:0 auto}
  .spin{animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  button{font-family:inherit;cursor:pointer}
  input,textarea{font-family:inherit}
  /* header */
  header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:20px}
  .brand{display:flex;align-items:center;gap:10px}
  .logo{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(166,124,61,.35)}
  h1{font-size:21px;font-weight:800;color:var(--head);letter-spacing:-.02em}
  .sub{font-size:13px;color:var(--txt2);margin-top:2px}
  .hdr-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .mode-pill{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:5px 11px;border-radius:20px;border:1px solid var(--line2)}
  .mode-cloud{background:var(--seeBg);color:var(--seeTx);border-color:transparent}
  .mode-local{background:#fdf6e6;color:var(--gold2);border-color:#f0e2c0}
  .sync-btn{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:9px;border:1px solid var(--line2);background:#fff;color:var(--txt2);font-weight:600;font-size:12px;white-space:nowrap}
  /* toolbar */
  .toolbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:20px}
  .segment{display:flex;gap:4px;background:#ece4d4;padding:4px;border-radius:12px}
  .seg-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:9px;border:none;background:transparent;color:var(--txt2);font-weight:600;font-size:13px}
  .seg-btn.on{background:#fff;color:var(--txt);box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .filters{display:flex;gap:7px;flex-wrap:wrap;flex:1}
  .chip{display:flex;align-items:center;gap:5px;padding:6px 11px;border-radius:20px;border:1px solid var(--line2);background:transparent;color:var(--txt2);font-size:12.5px;font-weight:600;white-space:nowrap}
  .chip .cnt{font-size:11px;padding:1px 6px;border-radius:10px;font-weight:700;background:#efe8d8}
  .add-btn{display:flex;align-items:center;gap:6px;padding:9px 16px;border-radius:11px;border:none;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;font-weight:700;font-size:13.5px;box-shadow:0 4px 12px rgba(166,124,61,.35);white-space:nowrap}
  /* grid + cards */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
  .card{background:var(--card);border-radius:16px;border:1px solid var(--line);padding:16px;position:relative;display:flex;flex-direction:column}
  .card.top{border-color:#e0bf6f;box-shadow:0 0 0 1px #e0bf6f}
  .top-badge{position:absolute;top:-9px;right:14px;background:#e0bf6f;color:#5a4410;font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:10px;display:flex;align-items:center;gap:4px}
  .cat-tag{display:inline-flex;align-items:center;gap:5px;padding:4px 9px;border-radius:8px;font-size:11.5px;font-weight:700}
  .icon-btn{background:transparent;border:none;color:var(--txt3);padding:4px;border-radius:6px;display:flex}
  .card-title{font-size:16px;font-weight:700;color:var(--head);line-height:1.35;margin-top:12px}
  .card-note{font-size:13px;color:#8a7d6a;margin-top:6px;line-height:1.5}
  .link-row{display:flex;flex-direction:column;gap:6px;margin-top:12px}
  .link-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:8px;background:#f4eee2;color:#7a6f5f;font-size:12px;font-weight:600;text-decoration:none}
  .link-host{margin-left:auto;font-size:11px;color:var(--txt3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:120px}
  .tags{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
  .pin-tag{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:8px;font-size:12px;font-weight:600}
  .pin-yes{background:var(--seeBg);color:#1d7d5e}
  .pin-no{background:#f6f1e6;color:var(--txt3)}
  .vote-btn{display:flex;align-items:center;justify-content:center;gap:7px;margin-top:14px;padding:9px;border-radius:11px;border:1px solid var(--line);background:#faf7f0;color:#6a5f4f;font-size:14px}
  .vote-btn.voted{background:#fdeef1;border-color:#f5c9d3}
  /* empty */
  .empty{text-align:center;padding:60px 20px;color:var(--txt2)}
  .empty-icon{width:64px;height:64px;border-radius:20px;background:#f1e8d6;display:flex;align-items:center;justify-content:center;margin:0 auto}
  /* summary */
  .summary{margin-top:24px;background:var(--card);border-radius:16px;border:1px solid var(--line);padding:20px 22px}
  .summary h2{font-size:15px;font-weight:700;color:var(--txt)}
  .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:14px}
  .stat{background:#faf7f0;border-radius:12px;padding:14px 16px;text-align:center}
  .stat .v{font-size:26px;font-weight:700;color:var(--txt);line-height:1}
  .stat .l{font-size:12px;color:var(--txt2);margin-top:4px}
  .rank-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid #f1ebdd}
  .rank-num{width:22px;height:22px;border-radius:50%;background:#f1e8d6;color:var(--gold2);font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center}
  .dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:640px){.dash-grid{grid-template-columns:1fr}}
  .dash-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px 22px}
  .dash-h{font-size:14px;font-weight:700;color:var(--head);margin-bottom:14px}
  .card-img{margin:12px -16px 0;height:140px;overflow:hidden}
  .card-img img{width:100%;height:100%;object-fit:cover;display:block}
  .nav-btn{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:10px;padding:8px;border-radius:10px;background:#eef4fb;color:#1a5fa8;font-size:12.5px;font-weight:600;text-decoration:none;border:1px solid #d6e6f5}
  /* map */
  #map{width:100%;height:440px;border-radius:16px;border:1px solid var(--line);overflow:hidden;z-index:0}
  .map-note{display:flex;align-items:center;gap:8px;background:#fdf6e6;border:1px solid #f0e2c0;color:var(--gold2);padding:10px 14px;border-radius:12px;font-size:13px;margin-bottom:12px}
  .legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:12px;justify-content:center}
  .legend span{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--txt2)}
  .dot{width:12px;height:12px;border-radius:50%}
  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(40,34,26,.5);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;padding:18px;z-index:1000}
  .modal{background:#fff;border-radius:20px;padding:22px 24px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25)}
  .modal h2{font-size:17px;font-weight:700;color:var(--txt)}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:13px;font-weight:600;color:#6a5f4f;margin-bottom:7px}
  .inp{width:100%;padding:9px 12px;border-radius:10px;border:1px solid var(--line2);background:#faf7f0;font-size:14px;color:var(--txt);outline:none}
  .inp:focus{border-color:var(--gold)}
  .link-field{position:relative;margin-bottom:8px}
  .link-field .ti{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--txt3)}
  .link-rm{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:transparent;border:none;color:#c4b59c;padding:4px;display:flex}
  .add-link{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:9px;border:1px dashed #d8cdb6;background:transparent;color:#a08a5f;font-weight:600;font-size:12.5px}
  .cat-choose{display:flex;align-items:center;gap:5px;padding:7px 12px;border-radius:10px;border:1.5px solid #ebe3d3;background:#faf7f0;color:#8a7d6a;font-size:12.5px;font-weight:600}
  .geo-btn{display:flex;align-items:center;gap:7px;padding:9px 14px;border-radius:10px;border:1px solid var(--line2);background:#faf7f0;color:#6a5f4f;font-weight:600;font-size:13px}
  .modal-actions{display:flex;gap:10px;margin-top:22px}
  .cancel-btn{flex:1;padding:11px;border-radius:11px;border:1px solid var(--line2);background:#fff;color:var(--txt2);font-weight:600;font-size:14px}
  .submit-btn{flex:2;display:flex;align-items:center;justify-content:center;gap:6px;padding:11px;border-radius:11px;border:none;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;font-weight:700;font-size:14px}
  .setup-banner{display:flex;align-items:flex-start;gap:10px;background:#eef4fb;border:1px solid #cfe0f3;color:#1c4f86;padding:12px 16px;border-radius:12px;font-size:13px;margin-bottom:18px;line-height:1.5}
  .leaflet-popup-content{font-family:'Noto Sans Thai',sans-serif;font-size:13px}
  svg.ic{width:1em;height:1em;vertical-align:-.125em;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="logo"><svg class="ic" style="width:20px;height:20px;color:#fff;stroke-width:2.4"><use href="#i-pin"/></svg></div>
      <div>
        <h1>วางแผนทริปด้วยกัน</h1>
        <p class="sub">เก็บที่เที่ยว · แยกหมวด · ปักหมุด · โหวตเลือกที่ไป</p>
      </div>
    </div>
    <div class="hdr-right">
      <span id="modePill" class="mode-pill mode-local"><svg class="ic"><use href="#i-users"/></svg><span id="modeText">เก็บในเครื่อง</span></span>

  </div>

  <div class="toolbar">
    <div class="segment">
      <button class="seg-btn on" id="viewList"><svg class="ic"><use href="#i-list"/></svg> รายการ</button>
      <button class="seg-btn" id="viewMap"><svg class="ic"><use href="#i-map"/></svg> แผนที่</button>
      <button class="seg-btn" id="viewDash"><svg class="ic"><use href="#i-chart"/></svg> สรุป</button>

    <button class="add-btn" id="addBtn"><svg class="ic" style="stroke-width:2.6"><use href="#i-plus"/></svg> เพิ่มสถานที่</button>
  </div>

  <div id="content"></div>
  <div id="summary"></div>
</div>

<!-- ============================================================
     ★★★ ตั้งค่าตรงนี้ เพื่อให้ "โหวตร่วมกัน" ผ่าน Google Sheets ★★★
     ดูคู่มือทีละขั้นในไฟล์ "คู่มือ-google-sheets.html" ที่แนบมา
     สรุปสั้นๆ:
     1. สร้าง Google Sheet ใหม่
     2. เมนู Extensions → Apps Script → วางโค้ดจากไฟล์ "apps-script-code.gs"
     3. กด Deploy → New deployment → ประเภท "Web app"
        - Execute as: Me
        - Who has access: Anyone
     4. ก็อปลิงก์ Web app URL (ลงท้าย /exec) มาวางด้านล่าง
     5. เซฟไฟล์ แล้วเปิดใหม่ → จะขึ้น "โหวตร่วมกัน" สีเขียว
     ถ้าเว้นว่างไว้ = เก็บในเครื่องตัวเองเท่านั้น (ใช้งานได้ปกติ)
   ============================================================ -->
<script>
  const SHEET_API = "https://script.google.com/macros/s/AKfycbzQf9M_SgoYzG1kRGdx9EReWjmfWekIsIdLJ5jL2pWLIfgZ0eUB8kqpUkpU85XfXQvr2g/exec";   // <-- วางลิงก์ Web app URL ที่นี่ เช่น "https://script.google.com/macros/s/XXXX/exec"
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
/* ---------- ค่าคงที่ ---------- */
const CATS = {
  stay:{label:"ที่พัก",icon:"i-bed",color:"var(--stay)",bg:"var(--stayBg)",tx:"var(--stayTx)",hex:"#7c5cff"},
  see:{label:"ที่เที่ยว",icon:"i-cam",color:"var(--see)",bg:"var(--seeBg)",tx:"var(--seeTx)",hex:"#1d9e75"},
  eat:{label:"ร้านอาหาร/คาเฟ่",icon:"i-eat",color:"var(--eat)",bg:"var(--eatBg)",tx:"var(--eatTx)",hex:"#d85a30"},
};
const CAT_ORDER = ["stay","see","eat"];
const LS_KEY = "trip_places_v1";

/* ---------- userId ประจำเครื่อง ---------- */
function getUserId(){
  let id = localStorage.getItem("trip_uid");
  if(!id){ id = "u_"+Math.random().toString(36).slice(2,10); localStorage.setItem("trip_uid", id); }
  return id;
}
const USER = getUserId();

/* ---------- ชั้นจัดการข้อมูล (Google Sheets หรือ local) ---------- */
const useCloud = !!SHEET_API;

const ic = (id,extra="")=>`<svg class="ic" ${extra}><use href="#${id}"/></svg>`;
const hostOf = (u)=>{ try{ return new URL(u).hostname.replace(/^www\./,""); }catch{ return ""; } };

/* เรียก Apps Script — ใช้ GET พร้อม action ใน query (เลี่ยง CORS preflight) */
async function api(action, payload){
  const url = SHEET_API + "?action=" + encodeURIComponent(action) +
    (payload ? "&data=" + encodeURIComponent(JSON.stringify(payload)) : "") +
    "&_=" + Date.now();
  const ctrl = new AbortController();
  const t = setTimeout(()=>ctrl.abort(), 15000); // กันค้างเกิน 15 วิ
  try{
    const r = await fetch(url, {signal:ctrl.signal});
    return await r.json();
  } finally { clearTimeout(t); }
}

let CLOUD_CACHE = [];
async function loadAll(){
  if(useCloud){
    try{
      const res = await api("list");
      const rows = (res && res.places) ? res.places : [];
      CLOUD_CACHE = rows.map(r=>({...r, links: r.links||[], votes: r.votes||[]}));
      return CLOUD_CACHE;
    }catch(e){ console.error(e); return CLOUD_CACHE; }
  } else {
    try{ return JSON.parse(localStorage.getItem(LS_KEY)||"[]"); }catch{ return []; }
  }
}
async function saveLocal(arr){ localStorage.setItem(LS_KEY, JSON.stringify(arr)); }

async function addPlace(p){
  const rec = {...p, id:"p_"+Date.now()+Math.random().toString(36).slice(2,6), votes:[], created_at:Date.now()};
  if(useCloud){ await api("add", rec); }
  else { const a = await loadAll(); a.push(rec); await saveLocal(a); }
}
async function removePlace(id){
  if(useCloud){ await api("delete", {id}); }
  else { const a = (await loadAll()).filter(p=>p.id!==id); await saveLocal(a); }
}
async function updatePlace(id, patch){
  if(useCloud){ await api("update", {id, patch}); }
  else { const a = await loadAll(); const i = a.findIndex(p=>p.id===id); if(i>=0){ a[i]={...a[i],...patch}; await saveLocal(a); } }
}
/* ดึงพิกัดจากลิงก์ Google Maps / พิกัดในข้อความ → {lat,lng} หรือ null */
function coordsFromLink(url){
  if(!url) return null;
  try{ url = decodeURIComponent(url); }catch{}
  // รูปแบบ @lat,lng (Google Maps URL)
  let m = url.match(/@(-?\d{1,3}\.\d+),(-?\d{1,3}\.\d+)/);
  if(m) return { lat:parseFloat(m[1]), lng:parseFloat(m[2]) };
  // รูปแบบ !3dLAT!4dLNG (ฝังใน Google Maps)
  m = url.match(/!3d(-?\d{1,3}\.\d+)!4d(-?\d{1,3}\.\d+)/);
  if(m) return { lat:parseFloat(m[1]), lng:parseFloat(m[2]) };
  // รูปแบบ q=lat,lng หรือ ll=lat,lng หรือ พิกัดล้วนในข้อความ
  m = url.match(/(?:[?&](?:q|ll|destination|center)=)(-?\d{1,3}\.\d+),(-?\d{1,3}\.\d+)/);
  if(m) return { lat:parseFloat(m[1]), lng:parseFloat(m[2]) };
  m = url.match(/^\s*(-?\d{1,2}\.\d+)\s*,\s*(-?\d{1,3}\.\d+)\s*$/);
  if(m) return { lat:parseFloat(m[1]), lng:parseFloat(m[2]) };
  return null;
}
/* ค้นหาพิกัดจากชื่อ คืนหลายผลลัพธ์ */
async function geocodeMany(name){
  const ctrl = new AbortController();
  const t = setTimeout(()=>ctrl.abort(), 10000);
  try{
    const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=5&accept-language=th&q=${encodeURIComponent(name)}`, {signal:ctrl.signal});
    const d = await r.json();
    return (d||[]).map(x=>({ lat:parseFloat(x.lat), lng:parseFloat(x.lon), label:(x.display_name||"") }));
  }catch{ return []; }
  finally{ clearTimeout(t); }
}
/* ค้นหาพิกัดจากชื่อ → ผลแรก (ใช้ตอนปักอัตโนมัติ) */
async function geocode(name){
  const list = await geocodeMany(name);
  if(list[0]) return { ...list[0], label:list[0].label.split(",").slice(0,2).join(",") };
  return null;
}
async function toggleVote(id){
  if(useCloud){
    // optimistic: อัปเดตหน้าจอทันที แล้วค่อยส่งให้ server toggle
    const p = PLACES.find(x=>x.id===id);
    if(p){ const v=p.votes||[]; p.votes = v.includes(USER)?v.filter(x=>x!==USER):[...v,USER]; renderContent(); renderSummary(); }
    await api("vote", {id, user:USER});
  } else {
    const all = await loadAll();
    const p = all.find(x=>x.id===id); if(!p) return;
    const votes = p.votes||[];
    p.votes = votes.includes(USER) ? votes.filter(v=>v!==USER) : [...votes, USER];
    await saveLocal(all);
  }
}

/* ---------- state UI ---------- */
let PLACES = [];
let view = "list";
let filter = "all";
let map = null, markers = [];

/* ---------- render ---------- */
function render(){
  renderFilters();
  renderContent();
  renderSummary();
}

function renderFilters(){
  const el = document.getElementById("filters");
  const chips = [`<button class="chip ${filter==='all'?'on':''}" data-f="all" ${filter==='all'?'style="background:#2c2620;color:#fff;border-color:transparent"':''}>ทั้งหมด<span class="cnt" ${filter==='all'?'style="background:rgba(255,255,255,.2);color:#fff"':''}>${PLACES.length}</span></button>`];
  CAT_ORDER.forEach(c=>{
    const n = PLACES.filter(p=>p.category===c).length;
    const on = filter===c;
    const cat = CATS[c];
    chips.push(`<button class="chip" data-f="${c}" ${on?`style="background:${cat.bg};color:${cat.tx};border-color:transparent"`:''}>${ic(cat.icon)} ${cat.label}<span class="cnt" ${on?'style="background:rgba(0,0,0,.1)"':''}>${n}</span></button>`);
  });
  el.innerHTML = chips.join("");
  el.querySelectorAll(".chip").forEach(b=>b.onclick=()=>{ filter=b.dataset.f; render(); });
}

function renderContent(){
  const el = document.getElementById("content");
  const list = filter==="all" ? PLACES : PLACES.filter(p=>p.category===filter);
  if(PLACES.length===0){
    el.innerHTML = `<div class="empty"><div class="empty-icon">${ic('i-pin','style="width:30px;height:30px;color:#c9a96a"')}</div>
      <p style="font-weight:600;color:#5a5043;margin:12px 0 4px">ยังไม่มีสถานที่</p>
      <p style="font-size:14px;color:#9b8f7e">กด "เพิ่มสถานที่" แล้ววางลิงก์ + ชื่อ เพื่อเริ่มเก็บข้อมูล</p></div>`;
    return;
  }
  if(view==="map"){ renderMap(list); return; }
  if(view==="dash"){ renderDashboard(); return; }
  const max = Math.max(0,...PLACES.map(p=>(p.votes||[]).length));
  const sorted = [...list].sort((a,b)=>(b.votes||[]).length-(a.votes||[]).length);
  el.innerHTML = `<div class="grid">${sorted.map(p=>cardHTML(p,max)).join("")}</div>`;
  el.querySelectorAll("[data-vote]").forEach(b=>b.onclick=async()=>{ await toggleVote(b.dataset.vote); await refresh(true); });
  el.querySelectorAll("[data-rm]").forEach(b=>b.onclick=async()=>{ if(confirm("ลบสถานที่นี้?")){ await removePlace(b.dataset.rm); await refresh(true); } });
  el.querySelectorAll("[data-edit]").forEach(b=>b.onclick=()=>{ const p=PLACES.find(x=>x.id===b.dataset.edit); if(p) openPlaceModal(p); });
}

function cardHTML(p,max){
  const cat = CATS[p.category]||CATS.see;
  const voted = (p.votes||[]).includes(USER);
  const count = (p.votes||[]).length;
  const top = max>0 && count===max;
  const links = (p.links&&p.links.length)?p.links:(p.link?[p.link]:[]);
  const linkHTML = links.length? `<div class="link-row">${links.map((l,i)=>`<a class="link-btn" href="${l}" target="_blank" rel="noreferrer">${ic('i-ext')} รีวิวที่ ${i+1}<span class="link-host">${hostOf(l)}</span></a>`).join("")}</div>`:"";
  const pinHTML = (p.lat&&p.lng)? `<span class="pin-tag pin-yes">${ic('i-pin')} ปักหมุดแล้ว</span>` : `<span class="pin-tag pin-no">${ic('i-pin')} ยังไม่มีพิกัด</span>`;
  const navUrl = (p.lat&&p.lng) ? `https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lng}` : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.name)}`;
  const navHTML = `<a class="nav-btn" href="${navUrl}" target="_blank" rel="noreferrer">${ic('i-nav','style="width:13px;height:13px"')} นำทาง Google Maps</a>`;
  const imgHTML = p.image? `<div class="card-img"><img src="${escapeHtml(p.image)}" alt="" loading="lazy" onerror="this.parentNode.style.display='none'"/></div>`:"";
  return `<div class="card ${top?'top':''}">
    ${top?`<div class="top-badge">${ic('i-crown','style="width:11px;height:11px"')} โหวตสูงสุด</div>`:''}
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
      <span class="cat-tag" style="background:${cat.bg};color:${cat.tx}">${ic(cat.icon,'style="width:12px;height:12px"')} ${cat.label}</span>
      <div style="display:flex;gap:2px">
        <button class="icon-btn" data-edit="${p.id}" aria-label="แก้ไข">${ic('i-edit','style="width:14px;height:14px"')}</button>
        <button class="icon-btn" data-rm="${p.id}" aria-label="ลบ">${ic('i-trash','style="width:14px;height:14px"')}</button>
      </div>
    </div>
    ${imgHTML}
    <h3 class="card-title">${escapeHtml(p.name)}</h3>
    ${p.note?`<p class="card-note">${escapeHtml(p.note)}</p>`:''}
    ${linkHTML}
    <div class="tags">${pinHTML}</div>
    ${navHTML}
    <button class="vote-btn ${voted?'voted':''}" data-vote="${p.id}">
      ${ic('i-heart',`style="width:15px;height:15px;${voted?'fill:var(--heart);color:var(--heart)':'color:#8a7d6a'}"`)}
      <span style="font-weight:600">${count}</span><span style="font-size:12px;opacity:.7">โหวต</span>
    </button>
  </div>`;
}

function renderMap(list){
  const el = document.getElementById("content");
  const pinned = list.filter(p=>p.lat&&p.lng);
  el.innerHTML = `${pinned.length===0?`<div class="map-note">${ic('i-pin')} ยังไม่มีสถานที่ที่ปักหมุด — เพิ่มพิกัดตอนเพิ่มสถานที่ (กดค้นหาจากชื่อ) เพื่อให้แสดงบนแผนที่</div>`:''}
    <div id="map"></div>
    <div class="legend">${CAT_ORDER.map(c=>`<span><span class="dot" style="background:${CATS[c].hex}"></span> ${CATS[c].label}</span>`).join("")}</div>`;
  setTimeout(()=>{
    if(map){ map.remove(); map=null; }
    map = L.map("map",{scrollWheelZoom:false}).setView([13.7563,100.5018],6);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"© OpenStreetMap",maxZoom:19}).addTo(map);
    const bounds=[];
    pinned.forEach(p=>{
      const cat = CATS[p.category]||CATS.see;
      const icon = L.divIcon({className:"",html:`<div style="background:${cat.hex};width:26px;height:26px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.3)"></div>`,iconSize:[26,26],iconAnchor:[13,26]});
      const m = L.marker([p.lat,p.lng],{icon}).addTo(map);
      const navU = `https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lng}`;
      const imgTag = p.image?`<img src="${escapeHtml(p.image)}" style="width:100%;height:80px;object-fit:cover;border-radius:6px;margin:4px 0" onerror="this.style.display='none'"/>`:"";
      m.bindPopup(`<b>${escapeHtml(p.name)}</b><br/>${cat.label}${(p.votes||[]).length?` · ❤️ ${(p.votes).length}`:""}${imgTag}<br/><a href="${navU}" target="_blank" style="color:#1a73e8;font-weight:600">นำทาง Google Maps →</a>`);
      bounds.push([p.lat,p.lng]);
    });
    if(bounds.length) map.fitBounds(bounds,{padding:[40,40],maxZoom:13});
    setTimeout(()=>map&&map.invalidateSize(),200);
  },50);
}

  const el = document.getElementById("summary");
  if(PLACES.length===0 || view==="dash"){ el.innerHTML=""; return; }
  const byCat = CAT_ORDER.map(c=>({c,n:PLACES.filter(p=>p.category===c).length})).filter(x=>x.n>0);
  const top = [...PLACES].sort((a,b)=>(b.votes||[]).length-(a.votes||[]).length).slice(0,3).filter(p=>(p.votes||[]).length>0);
  const pinned = PLACES.filter(p=>p.lat&&p.lng).length;
  const totalVotes = PLACES.reduce((s,p)=>s+(p.votes||[]).length,0);
  el.innerHTML = `<div class="summary">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">${ic('i-info','style="color:#c9a96a"')}<h2>สรุปภาพรวม</h2></div>
    <div class="stat-grid">
      <div class="stat"><div class="v">${PLACES.length}</div><div class="l">สถานที่ทั้งหมด</div></div>
      <div class="stat"><div class="v">${pinned}</div><div class="l">ปักหมุดแล้ว</div></div>
      <div class="stat"><div class="v">${totalVotes}</div><div class="l">โหวตรวม</div></div>
    </div>
    <div class="tags" style="margin-top:14px">${byCat.map(({c,n})=>`<span class="cat-tag" style="background:${CATS[c].bg};color:${CATS[c].tx}">${ic(CATS[c].icon,'style="width:12px;height:12px"')} ${CATS[c].label} · ${n}</span>`).join("")}</div>
    ${top.length?`<div style="margin-top:16px"><p style="font-size:12px;color:#9b8f7e;margin-bottom:8px;font-weight:600">อันดับโหวตสูงสุด</p>
      ${top.map((p,i)=>`<div class="rank-row"><span class="rank-num">${i+1}</span><span style="flex:1;font-weight:500;color:#4a4136">${escapeHtml(p.name)}</span><span style="display:flex;align-items:center;gap:4px;color:var(--heart);font-weight:600;font-size:13px">${ic('i-heart','style="width:13px;height:13px;fill:var(--heart)"')} ${(p.votes).length}</span></div>`).join("")}</div>`:''}
  </div>`;

function escapeHtml(s){ return (s||"").replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

/* ---------- Dashboard: กราฟ + สถิติในเว็บ ---------- */
function renderDashboard(){
  const el = document.getElementById("content");
  if(PLACES.length===0){
    el.innerHTML = `<div class="empty"><div class="empty-icon">${ic('i-chart','style="width:30px;height:30px;color:#c9a96a"')}</div>
      <p style="font-weight:600;color:#5a5043;margin:12px 0 4px">ยังไม่มีข้อมูลให้สรุป</p>
      <p style="font-size:14px;color:#9b8f7e">เพิ่มสถานที่ก่อน แล้วกลับมาดูกราฟสรุปที่นี่</p></div>`;
    return;
  }
  const totalVotes = PLACES.reduce((s,p)=>s+(p.votes||[]).length,0);
  const pinned = PLACES.filter(p=>p.lat&&p.lng).length;
  const byCat = CAT_ORDER.map(c=>({c,n:PLACES.filter(p=>p.category===c).length,v:PLACES.filter(p=>p.category===c).reduce((s,p)=>s+(p.votes||[]).length,0)}));
  const maxVote = Math.max(1,...PLACES.map(p=>(p.votes||[]).length));
  const ranked = [...PLACES].sort((a,b)=>(b.votes||[]).length-(a.votes||[]).length);

  /* วงกลม (donut) สัดส่วนหมวด */
  const totalN = PLACES.length || 1;
  let acc = 0; const circ = 2*Math.PI*52;
  const segs = byCat.filter(x=>x.n>0).map(x=>{
    const frac = x.n/totalN; const dash = frac*circ; const off = acc*circ; acc += frac;
    return `<circle cx="70" cy="70" r="52" fill="none" stroke="${CATS[x.c].hex}" stroke-width="20" stroke-dasharray="${dash} ${circ-dash}" stroke-dashoffset="${-off}" transform="rotate(-90 70 70)"></circle>`;
  }).join("");

  el.innerHTML = `
  <div class="stat-grid" style="margin-bottom:16px">
    <div class="stat"><div class="v">${PLACES.length}</div><div class="l">สถานที่ทั้งหมด</div></div>
    <div class="stat"><div class="v">${totalVotes}</div><div class="l">โหวตรวม</div></div>
    <div class="stat"><div class="v">${pinned}</div><div class="l">ปักหมุดแล้ว</div></div>
  </div>

  <div class="dash-grid">
    <div class="dash-card">
      <h3 class="dash-h">สัดส่วนตามหมวด</h3>
      <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap;justify-content:center">
        <svg width="140" height="140" viewBox="0 0 140 140">${segs}
          <text x="70" y="64" text-anchor="middle" font-size="26" font-weight="800" fill="#3a3228">${PLACES.length}</text>
          <text x="70" y="84" text-anchor="middle" font-size="11" fill="#9b8f7e">สถานที่</text>
        </svg>
        <div style="display:flex;flex-direction:column;gap:8px">
          ${byCat.filter(x=>x.n>0).map(x=>`<div style="display:flex;align-items:center;gap:8px;font-size:13px;color:#5a5043"><span style="width:12px;height:12px;border-radius:3px;background:${CATS[x.c].hex}"></span><b style="color:#3a3228">${x.n}</b> ${CATS[x.c].label}</div>`).join("")}
        </div>
      </div>
    </div>

    <div class="dash-card">
      <h3 class="dash-h">คะแนนโหวตตามหมวด</h3>
      ${byCat.map(x=>{
        const w = totalVotes>0 ? Math.round(x.v/Math.max(1,Math.max(...byCat.map(y=>y.v)))*100) : 0;
        return `<div style="margin:10px 0">
          <div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:4px"><span style="color:#5a5043">${CATS[x.c].label}</span><span style="color:#9b8f7e;font-weight:600">${x.v} โหวต</span></div>
          <div style="height:10px;background:#f1e8d6;border-radius:6px;overflow:hidden"><div style="height:100%;width:${w}%;background:${CATS[x.c].hex};border-radius:6px;transition:width .5s"></div></div>
        </div>`;
      }).join("")}
    </div>
  </div>

  <div class="dash-card" style="margin-top:16px">
    <h3 class="dash-h">อันดับโหวต — ทุกสถานที่</h3>
    ${ranked.map((p,i)=>{
      const v=(p.votes||[]).length; const w=Math.round(v/maxVote*100);
      const cat=CATS[p.category]||CATS.see;
      return `<div style="display:flex;align-items:center;gap:12px;padding:9px 0;border-top:${i?'1px solid #f1ebdd':'none'}">
        <span class="rank-num" style="${i===0&&v>0?'background:#e0bf6f;color:#5a4410':''}">${i+1}</span>
        <div style="flex:1;min-width:0">
          <div style="display:flex;justify-content:space-between;gap:8px;margin-bottom:5px">
            <span style="font-weight:600;color:#3a3228;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escapeHtml(p.name)}</span>
            <span style="display:flex;align-items:center;gap:4px;color:var(--heart);font-weight:700;font-size:13px;flex-shrink:0">${ic('i-heart','style="width:13px;height:13px;fill:var(--heart)"')} ${v}</span>
          </div>
          <div style="height:8px;background:#f1e8d6;border-radius:5px;overflow:hidden"><div style="height:100%;width:${w}%;background:${cat.hex};border-radius:5px;transition:width .5s"></div></div>
        </div>
      </div>`;
    }).join("")}
  </div>`;
}

/* ---------- โหลด/รีเฟรช ---------- */
let syncing=false;
async function refresh(silent){
  if(!silent){ const t=document.getElementById("syncText"); if(t)t.textContent="กำลังซิงค์…"; }
  PLACES = await loadAll();
  render();
  const t=document.getElementById("syncText");
  if(t) t.textContent = "อัปเดต "+new Date().toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit"});
}

function openPlaceModal(existing){
  const editing = !!existing;
  let links = editing ? ((existing.links&&existing.links.length)?[...existing.links]:(existing.link?[existing.link]:[""])) : [""];
  if(links.length===0) links=[""];
  let name = editing ? (existing.name||"") : "";
  let note = editing ? (existing.note||"") : "";
  let image = editing ? (existing.image||"") : "";
  let category = editing ? (existing.category||"see") : "see";
  let lat = editing ? (existing.lat??null) : null;
  let lng = editing ? (existing.lng??null) : null;
  let geoMsg = (editing && lat && lng) ? "มีพิกัดแล้ว ✓ (ค้นใหม่/ปักเองเพื่อเปลี่ยน)" : "";
  let geoOk = !!(lat && lng);
  let results = [];      // ผลค้นหาหลายรายการ
  let pickMode = false;  // โหมดปักหมุดเองบนแผนที่
  let pickMap = null;

  const wrap = document.createElement("div");
  wrap.className="overlay";

  function draw(){
    const pinState = (lat&&lng)
      ? `<p style="font-size:12px;margin-top:8px;color:#1d9e75">${escapeHtml(geoMsg||"ปักหมุดแล้ว ✓")} <span style="color:#9b8f7e">(${lat.toFixed(4)}, ${lng.toFixed(4)})</span></p>`
      : (geoMsg?`<p style="font-size:12px;margin-top:8px;color:#c08a3e">${escapeHtml(geoMsg)}</p>`:`<p style="font-size:12px;margin-top:8px;color:#b9ac96">ถ้าไม่ทำอะไร ระบบจะค้นหาพิกัดให้อัตโนมัติตอนบันทึก</p>`);
    wrap.innerHTML = `<div class="modal">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <h2>${editing?"แก้ไขสถานที่":"เพิ่มสถานที่"}</h2><button class="icon-btn" id="mClose">${ic('i-x','style="width:18px;height:18px"')}</button>
      </div>
      <p style="font-size:13px;color:#9b8f7e;margin-bottom:18px">${editing?"แก้ข้อมูลแล้วกดบันทึก":"วางลิงก์รีวิว (เพิ่มได้หลายอัน) แล้วกรอกชื่อ + เลือกหมวด"}</p>
      <div class="field"><label>ลิงก์รีวิว (เพิ่มได้ไม่จำกัด)</label>
        <div id="linkList">${links.map((l,i)=>`<div class="link-field">${ic('i-link')}<input class="inp" style="padding-left:34px;padding-right:${links.length>1?38:12}px" data-li="${i}" value="${escapeHtml(l)}" placeholder="${i===0?'วางลิงก์รีวิวที่ 1':'ลิงก์รีวิวที่ '+(i+1)}"/>${links.length>1?`<button class="link-rm" data-rmli="${i}">${ic('i-x','style="width:14px;height:14px"')}</button>`:''}</div>`).join("")}</div>
        <button class="add-link" id="addLink">${ic('i-plus','style="width:14px;height:14px"')} เพิ่มลิงก์รีวิว</button>
      </div>
      <div class="field"><label>ชื่อสถานที่ *</label><input class="inp" id="mName" value="${escapeHtml(name)}" placeholder="เช่น วัดร่องขุ่น เชียงราย"/></div>
      <div class="field"><label>ประเภท</label>
        <div style="display:flex;flex-wrap:wrap;gap:8px" id="catChoose">
          ${CAT_ORDER.map(c=>{const cat=CATS[c];const on=category===c;return `<button class="cat-choose" data-cat="${c}" ${on?`style="background:${cat.bg};color:${cat.tx};border-color:${cat.color}"`:''}>${ic(cat.icon,'style="width:14px;height:14px"')} ${cat.label}</button>`;}).join("")}
        </div>
      </div>
      <div class="field"><label>โน้ต (ไม่บังคับ)</label><textarea class="inp" id="mNote" rows="2" style="padding-top:9px;resize:vertical" placeholder="ราคา, เวลาเปิด, เหตุผลที่อยากไป…">${escapeHtml(note)}</textarea></div>
      <div class="field"><label>ลิงก์รูปภาพ (ไม่บังคับ)</label>
        <div class="link-field">${ic('i-image')}<input class="inp" id="mImage" style="padding-left:34px" value="${escapeHtml(image)}" placeholder="วางลิงก์รูป เช่น https://...jpg"/></div>
        ${image?`<img src="${escapeHtml(image)}" alt="" style="margin-top:8px;width:100%;height:120px;object-fit:cover;border-radius:10px;border:1px solid var(--line)" onerror="this.style.display='none'"/>`:''}
        <p style="font-size:11.5px;color:#b9ac96;margin-top:6px">ก็อปลิงก์รูปจากเว็บ (คลิกขวาที่รูป → คัดลอกที่อยู่รูปภาพ) แล้ววางที่นี่</p>
      </div>
      <div class="field"><label>พิกัดแผนที่</label>
        <div style="display:flex;flex-wrap:wrap;gap:8px">
          <button class="geo-btn" id="geoBtn">${ic('i-search','style="width:14px;height:14px"')} ค้นหาจากชื่อ</button>
          <button class="geo-btn" id="fromLinkBtn">${ic('i-link','style="width:14px;height:14px"')} ดึงจากลิงก์</button>
          <button class="geo-btn" id="pickBtn" ${pickMode?'style="background:var(--seeBg);color:var(--seeTx);border-color:transparent"':''}>${ic('i-pin','style="width:14px;height:14px"')} ปักเองบนแผนที่</button>
        </div>
        ${pinState}
        ${results.length?`<div id="geoResults" style="margin-top:10px;display:flex;flex-direction:column;gap:6px">
          <p style="font-size:12px;color:#9b8f7e;font-weight:600">เลือกตำแหน่งที่ใช่:</p>
          ${results.map((r,i)=>`<button class="geo-result" data-res="${i}" style="text-align:left;padding:8px 11px;border-radius:9px;border:1px solid var(--line2);background:#faf7f0;font-size:12.5px;color:#5a5043;line-height:1.4">${ic('i-pin','style="width:12px;height:12px;color:#c9a96a"')} ${escapeHtml(r.label.split(",").slice(0,3).join(","))}</button>`).join("")}
        </div>`:''}
        ${pickMode?`<div id="pickMap" style="margin-top:10px;height:220px;border-radius:12px;border:1px solid var(--line);overflow:hidden"></div>
          <p style="font-size:12px;color:#9b8f7e;margin-top:6px">คลิกบนแผนที่เพื่อปักหมุดตรงจุดที่ต้องการ</p>`:''}
      </div>
      <div class="modal-actions">
        <button class="cancel-btn" id="mCancel">ยกเลิก</button>
        <button class="submit-btn" id="mSubmit">${ic(editing?'i-edit':'i-plus','style="width:16px;height:16px;stroke-width:2.6"')} ${editing?"บันทึกการแก้ไข":"เพิ่มลงรายการ"}</button>
      </div>
    </div>`;
    bind();
  }

  /* อ่านค่าทุกช่องจาก DOM กลับเข้า state (เรียกก่อน redraw ทุกครั้ง) */
  function sync(){
    const m = wrap.querySelector(".modal"); if(!m) return;
    m.querySelectorAll("[data-li]").forEach(inp=>{ links[+inp.dataset.li]=inp.value; });
    const n=m.querySelector("#mName"); if(n) name=n.value;
    const nt=m.querySelector("#mNote"); if(nt) note=nt.value;
    const im=m.querySelector("#mImage"); if(im) image=im.value;
  }

  function bind(){
    const m = wrap.querySelector(".modal");
    m.querySelector("#mClose").onclick = close;
    m.querySelector("#mCancel").onclick = close;
    m.querySelectorAll("[data-li]").forEach(inp=>inp.oninput=()=>{ links[+inp.dataset.li]=inp.value; });
    m.querySelectorAll("[data-rmli]").forEach(b=>b.onclick=()=>{ sync(); const i=+b.dataset.rmli; links = links.length>1?links.filter((_,idx)=>idx!==i):[""]; draw(); });
    m.querySelector("#addLink").onclick=()=>{ sync(); links.push(""); draw(); };
    m.querySelectorAll("[data-cat]").forEach(b=>b.onclick=()=>{ sync(); category=b.dataset.cat; draw(); });
    m.querySelector("#geoBtn").onclick=async()=>{
      sync();
      if(!name.trim()){ geoMsg="ใส่ชื่อสถานที่ก่อน"; geoOk=false; results=[]; draw(); return; }
      const btn = m.querySelector("#geoBtn"); btn.innerHTML = ic('i-loader','class="ic spin" style="width:14px;height:14px"')+" กำลังค้นหา…"; btn.disabled=true;
      const list = await geocodeMany(name.trim());
      pickMode=false;
      if(list.length===1){ lat=list[0].lat; lng=list[0].lng; geoMsg="พบพิกัดแล้ว ✓ "+list[0].label.split(",").slice(0,2).join(","); geoOk=true; results=[]; }
      else if(list.length>1){ results=list; geoMsg="พบ "+list.length+" ตำแหน่ง เลือกอันที่ใช่ด้านล่าง"; geoOk=false; }
      else { results=[]; geoMsg="ไม่พบจากชื่อ — ลองวางลิงก์ Google Maps แล้วกด \"ดึงจากลิงก์\" หรือปักเองบนแผนที่"; geoOk=false; }
      draw();
    };
    /* ดึงพิกัดจากลิงก์ Google Maps ที่วางไว้ */
    m.querySelector("#fromLinkBtn").onclick=()=>{
      sync(); results=[]; pickMode=false;
      let found=null;
      for(const l of links){ const c=coordsFromLink(l); if(c){ found=c; break; } }
      if(found){ lat=found.lat; lng=found.lng; geoMsg="ดึงพิกัดจากลิงก์สำเร็จ ✓"; geoOk=true; }
      else { geoMsg="ลิงก์ไม่มีพิกัดในตัว — เปิดลิงก์ Google Maps, กดแชร์ แล้วก็อปลิงก์ที่มีตัวเลข @13.7,100.5 หรือใช้ปักเองบนแผนที่"; geoOk=false; }
      draw();
    };
    /* เลือกผลค้นหาจากรายการ */
    m.querySelectorAll("[data-res]").forEach(b=>b.onclick=()=>{
      const r=results[+b.dataset.res]; if(r){ lat=r.lat; lng=r.lng; geoMsg="เลือกแล้ว ✓ "+r.label.split(",").slice(0,2).join(","); geoOk=true; results=[]; draw(); }
    });
    /* สลับโหมดปักเองบนแผนที่ */
    m.querySelector("#pickBtn").onclick=()=>{ sync(); results=[]; pickMode=!pickMode; draw(); };
    if(pickMode){ initPickMap(); }
    m.querySelector("#mSubmit").onclick=async()=>{
      sync();
      if(!name.trim()){ alert("กรุณาใส่ชื่อสถานที่"); return; }
      const btn = m.querySelector("#mSubmit");
      if(btn.disabled) return; // กันกดซ้ำ
      btn.disabled=true;
      const cleanLinks = links.map(l=>l.trim()).filter(Boolean);
      try{
        /* ปักหมุดอัตโนมัติตอนบันทึก: ลองดึงจากลิงก์ก่อน (แม่นสุด) → ค่อยค้นจากชื่อ */
        if(!(lat&&lng)){
          btn.innerHTML = ic('i-loader','class="ic spin" style="width:16px;height:16px"')+" กำลังปักหมุด…";
          for(const l of cleanLinks){ const c=coordsFromLink(l); if(c){ lat=c.lat; lng=c.lng; break; } }
          if(!(lat&&lng)){ try{ const res = await geocode(name.trim()); if(res){ lat=res.lat; lng=res.lng; } }catch(e){} }
        }
        btn.innerHTML = ic('i-loader','class="ic spin" style="width:16px;height:16px"')+" กำลังบันทึก…";
        const payload = {name:name.trim(),category,note:note.trim(),image:image.trim(),links:cleanLinks,lat,lng};
        if(editing) await updatePlace(existing.id, payload);
        else await addPlace(payload);
        /* แสดงผลสำเร็จก่อนปิด */
        btn.innerHTML = ic('i-check','style="width:16px;height:16px"')+(editing?" บันทึกแล้ว ✓":" เพิ่มแล้ว ✓");
        btn.style.background = "linear-gradient(135deg,#1d9e75,#15805e)";
        await refresh(true);
        setTimeout(close, 700);
      }catch(err){
        console.error(err);
        btn.disabled=false;
        btn.innerHTML = ic(editing?'i-edit':'i-plus','style="width:16px;height:16px;stroke-width:2.6"')+(editing?" บันทึกการแก้ไข":" เพิ่มลงรายการ");
        alert("บันทึกไม่สำเร็จ — ตรวจสอบการเชื่อมต่อเน็ต แล้วลองใหม่อีกครั้ง\n\n("+(err&&err.message?err.message:"unknown")+")");
      }
    };
  }

  /* แผนที่เล็กสำหรับปักหมุดเอง */
  function initPickMap(){
    setTimeout(()=>{
      const elx = wrap.querySelector("#pickMap"); if(!elx || !window.L) return;
      if(pickMap){ pickMap.remove(); pickMap=null; }
      const start = (lat&&lng)?[lat,lng]:[13.7563,100.5018];
      pickMap = L.map(elx,{scrollWheelZoom:false}).setView(start, (lat&&lng)?14:6);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"© OpenStreetMap",maxZoom:19}).addTo(pickMap);
      let marker = null;
      function setMk(la,ln){ if(marker) marker.setLatLng([la,ln]); else marker=L.marker([la,ln]).addTo(pickMap); }
      if(lat&&lng) setMk(lat,lng);
      pickMap.on("click",(e)=>{
        lat=e.latlng.lat; lng=e.latlng.lng; geoOk=true; geoMsg="ปักเองบนแผนที่แล้ว ✓"; setMk(lat,lng);
      });
      setTimeout(()=>pickMap&&pickMap.invalidateSize(),200);
    },60);
  }

  function close(){
    try{ if(pickMap){ pickMap.remove(); pickMap=null; } }catch(e){}
    wrap.remove();
  }

  wrap.onclick=(e)=>{ if(e.target===wrap) close(); };
  document.body.appendChild(wrap);
  draw();
}

/* ---------- events ---------- */
document.getElementById("addBtn").onclick = openAddModal;
function setView(v){
  view=v;
  document.getElementById("viewList").classList.toggle("on", v==="list");
  document.getElementById("viewMap").classList.toggle("on", v==="map");
  document.getElementById("viewDash").classList.toggle("on", v==="dash");
  render();
}
document.getElementById("viewList").onclick = ()=>setView("list");
document.getElementById("viewMap").onclick = ()=>setView("map");
document.getElementById("viewDash").onclick = ()=>setView("dash");
document.getElementById("syncBtn").onclick = ()=>refresh(false);
document.getElementById("dismissBanner")?.addEventListener("click",(e)=>{ e.preventDefault(); document.getElementById("setupBanner").style.display="none"; });

/* โหมด badge */
if(useCloud){
  document.getElementById("modePill").className="mode-pill mode-cloud";
  document.getElementById("modeText").textContent="โหวตร่วมกัน (ออนไลน์)";
} else {
  document.getElementById("modePill").className="mode-pill mode-local";
  document.getElementById("modeText").textContent="เก็บในเครื่อง";
  document.getElementById("setupBanner").style.display="flex";
}

/* auto-refresh ทุก 15 วิ เฉพาะ cloud (ไม่เปิด modal) */
if(useCloud){
  setInterval(()=>{ if(!document.querySelector(".overlay")) refresh(true); },15000);
}

/* เริ่ม */
refresh(true);
</script>
</body>
</html>
